<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>CIE Válido Extremadura</title>
    <style>
        @page { size: A4; margin: 0; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { margin: 0; padding: 0; background: white; -webkit-print-color-adjust: exact; print-color-adjust: exact; display: block; }

        .pagina-documento {
            display: block;
            width: 210mm;
            height: 297mm;
            position: relative;
            background-repeat: no-repeat;
            background-position: top left;
            background-size: 210mm 297mm;
            page-break-after: always;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
            font-size: 7.5pt;
            color: #000;
        }
        .pagina-documento:last-child { page-break-after: avoid; }

        .overlay-field {
            position: absolute;
            display: block;
            box-sizing: border-box;
            margin: 0;
            padding: 0 0.5mm;
            white-space: nowrap;
            overflow: visible;
            color: #000;
            font-family: Arial, sans-serif;
            line-height: 1.2;
        }

        .overlay-marker {
            position: absolute;
            display: block;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-size: 6pt;
            font-weight: bold;
            color: #000;
            font-family: Arial, sans-serif;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <!-- Página 1: Secciones 1-4 (Titular, Identificación, Características, Responsables) -->
    <th:block th:replace="~{legalizacion/fragments/cie-ext/cie-ext-p1 :: content}"></th:block>

    <!-- Página 2: Anexo Generadores de Energía -->
    <th:block th:replace="~{legalizacion/fragments/cie-ext/cie-ext-p2 :: content}"></th:block>

    <!-- Página 3: Infraestructura Eléctrica -->
    <th:block th:replace="~{legalizacion/fragments/cie-ext/cie-ext-p3 :: content}"></th:block>

    <!-- Página 4: Información Ambiental y Presupuesto -->
    <th:block th:replace="~{legalizacion/fragments/cie-ext/cie-ext-p4 :: content}"></th:block>
</body>
</html>
