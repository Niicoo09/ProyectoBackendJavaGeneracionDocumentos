<div th:fragment="content(fondoStyle)" class="pagina-documento" th:style="${fondoStyle}">

    <!-- Aclaraciones a la Memoria -->
    <div class="overlay-field" style="left: 13mm; top: 38mm; width: 180mm; font-size: 8.5pt; line-height: 1.6; text-align: left; font-family: sans-serif; white-space: pre-line; font-weight: bold;">
MEMORIA TÉCNICA PARA INSTALACIÓN FOTOVOLTAICA PARA AUTOCONSUMO EN VIVIENDA EN <span th:text="${#strings.toUpperCase(form['emplazamientoCalle'] ?: '')}"></span>, <span th:text="${form['numero'] != null and form['numero'] != '' ? 'Nº ' + form['numero'] + ', ' : ''}"></span><span th:text="${#strings.toUpperCase(form['localidad'] ?: '')}"></span> [<span th:text="${#strings.toUpperCase(form['provincia'] ?: '')}"></span>].

CARACTERÍSTICAS :
- <span th:text="${form['totalModulos'] ?: '0'}"></span> PANELES <span th:text="${#strings.toUpperCase(form['marcaModeloModulo'] ?: '')}"></span> <span th:text="${form['potenciaPicoModulo'] != null and form['potenciaPicoModulo'] != '' ? form['potenciaPicoModulo'] + 'WP' : ''}"></span>
- <span th:text="${form['numeroBaterias'] != null and form['numeroBaterias'] != '' ? form['numeroBaterias'] : '0'}"></span> BATERÍAS <span th:text="${#strings.toUpperCase(form['marcaModeloBateria'] ?: '')}"></span> <span th:text="${form['energiaTotalBateria'] != null and form['energiaTotalBateria'] != '' ? form['energiaTotalBateria'] + 'KWH' : ''}"></span>
- <span th:text="${form['marcaModeloInversor2'] != null and form['marcaModeloInversor2'] != '' ? '2' : '1'}"></span> INVERSORES <span th:text="${#strings.toUpperCase(form['marcaModeloInversor'] ?: '')}"></span> <span th:text="${form['potenciaACInversor'] != null and form['potenciaACInversor'] != '' ? form['potenciaACInversor'] + 'KW' : ''}"></span><span th:text="${form['marcaModeloInversor2'] != null and form['marcaModeloInversor2'] != '' ? ' Y ' + #strings.toUpperCase(form['marcaModeloInversor2']) + ' ' + form['potenciaACInversor2'] + 'KW' : ''}"></span>
    </div>

    <!-- Pág Número -->
    <span class="overlay-field" data-cal-id="m4_pag_num" style="left:125.5mm; top:285mm; font-size:7.5pt;">4</span>

    <!-- Pág Total -->
    <span class="overlay-field" data-cal-id="m4_pag_tot" style="left:136.5mm; top:284.5mm; font-size:7.5pt;">8</span>

</div>
