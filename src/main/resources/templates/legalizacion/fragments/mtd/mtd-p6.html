<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<!--/*
  FRAGMENTO: MTD Baja Tension Extremadura - Pagina 6
  Variables disponibles: form, fondoStyle, firmaBase64, esquemaUnifilarBase64
*/-->
<div th:fragment="content(fondoStyle)" class="pagina-documento" th:style="${fondoStyle}">

    <!-- Esquema Unifilar de la Instalación -->
    <div style="position: absolute; left: 12mm; top: 35mm; width: 185mm; height: 220mm; display: flex; align-items: center; justify-content: center;">
        <img th:if="${esquemaUnifilarBase64 != null and !esquemaUnifilarBase64.isEmpty()}" 
             th:src="${esquemaUnifilarBase64.startsWith('data:') ? esquemaUnifilarBase64 : 'data:image/png;base64,' + esquemaUnifilarBase64}"
             style="max-width: 100%; max-height: 100%; object-fit: contain;" />
    </div>

</div>
</body>
</html>
