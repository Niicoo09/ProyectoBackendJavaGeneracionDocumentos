<div th:fragment="content(fondoStyle)" class="pagina-documento" th:style="${fondoStyle}">

    <!-- Expediente -->
    <span class="overlay-field" data-cal-id="m1_exp" style="left:154mm; top:38mm; font-size:7.5pt;"
          th:text="${form['numeroExpediente'] ?: ''}"></span>

    <!-- S1 Titular Nombre/Razón Social -->
    <span class="overlay-field" data-cal-id="m1_nombre" style="left:13mm; top:53.5mm; font-size:7.5pt;"
          th:text="${form['apellidosNombre'] ?: ''}"></span>

    <!-- S1 Titular NIF/CIF -->
    <span class="overlay-field" data-cal-id="m1_nif" style="left:162.5mm; top:53mm; font-size:7.5pt;"
          th:text="${form['nifCif'] ?: ''}"></span>

    <!-- S1 Titular Domicilio -->
    <span class="overlay-field" data-cal-id="m1_dom" style="left:12.5mm; top:60.5mm; font-size:7.5pt;"
          th:text="${form['domicilio'] ?: ''}"></span>

    <!-- S1 Titular Código Postal -->
    <span class="overlay-field" data-cal-id="m1_cp" style="left:162.5mm; top:60.5mm; font-size:7.5pt;"
          th:text="${form['codigoPostal'] ?: ''}"></span>

    <!-- S1 Titular Localidad -->
    <span class="overlay-field" data-cal-id="m1_loc" style="left:12.5mm; top:68.5mm; font-size:7.5pt;"
          th:text="${form['localidad'] ?: ''}"></span>

    <!-- S1 Titular Provincia -->
    <span class="overlay-field" data-cal-id="m1_prov" style="left:82.5mm; top:68mm; font-size:7.5pt;"
          th:text="${form['provincia'] ?: ''}"></span>

    <!-- S1 Titular Email -->
    <span class="overlay-field" data-cal-id="m1_email" style="left:107.5mm; top:68.5mm; font-size:7.5pt;"
          th:text="${form['correoElectronico'] ?: ''}"></span>

    <!-- S1 Titular Teléfono -->
    <span class="overlay-field" data-cal-id="m1_tel" style="left:162mm; top:68.5mm; font-size:7.5pt;"
          th:text="${form['telefono'] ?: ''}"></span>

    <!-- S2 Redactor [X] Habilitación -->
    <span class="overlay-marker" data-cal-id="m1_red_hab" style="left:62.5mm; top:89mm;">X</span>

    <!-- S2 Redactor Nombre -->
    <span class="overlay-field" data-cal-id="m1_red_nom" style="left:11.5mm; top:95.5mm; font-size:7.5pt;"
          th:text="${form['nombreTecnicoInstalador'] ?: form['tecnico'] ?: 'EDUARDO RIVERA CABEZAS'}"></span>

    <!-- S2 Redactor NIF -->
    <span class="overlay-field" data-cal-id="m1_red_nif" style="left:162.5mm; top:96mm; font-size:7.5pt;"
          th:text="${form['nifInstalador'] ?: form['nifTecnico'] ?: '28.818.007-L'}"></span>

    <!-- S2 Redactor Domicilio -->
    <span class="overlay-field" data-cal-id="m1_red_dom" style="left:11.5mm; top:103.5mm; font-size:7.5pt;"
          th:text="${form['domicilioTecnico'] ?: 'Calle El Peñón, 5'}"></span>

    <!-- S2 Redactor Teléfono -->
    <span class="overlay-field" data-cal-id="m1_red_tel" style="left:162.5mm; top:103.5mm; font-size:7.5pt;"
          th:text="${form['telefonoTecnico'] ?: '629 118 196'}"></span>

    <!-- S2 Redactor Localidad -->
    <span class="overlay-field" data-cal-id="m1_red_loc" style="left:11.5mm; top:111mm; font-size:7.5pt;"
          th:text="${form['localidadTecnico'] ?: 'Tomares'}"></span>

    <!-- S2 Redactor Provincia -->
    <span class="overlay-field" data-cal-id="m1_red_prov" style="left:81.5mm; top:111mm; font-size:7.5pt;"
          th:text="${form['provinciaTecnico'] ?: 'Sevilla'}"></span>

    <!-- S2 Redactor Email -->
    <span class="overlay-field" data-cal-id="m1_red_email" style="left:107.5mm; top:111mm; font-size:7.5pt;"
          th:text="${form['emailTecnico'] ?: 'msuarez@solay.es'}"></span>

    <!-- S2 Redactor CP -->
    <span class="overlay-field" data-cal-id="m1_red_cp" style="left:162.5mm; top:111mm; font-size:7.5pt;"
          th:text="${form['cpTecnico'] ?: form['codigoPostalTecnico'] ?: '41940'}"></span>

    <!-- S2 Redactor ID Empresa -->
    <span class="overlay-field" data-cal-id="m1_red_id" style="left:12.5mm; top:118mm; font-size:7.5pt;"
          th:text="${form['numeroInstaladorEmpresa'] ?: form['numeroCertificadoInstalador'] ?: '41045500'}"></span>

    <!-- S2 Redactor Titulación -->
    <span class="overlay-field" data-cal-id="m1_red_tit" style="left:81.5mm; top:118.5mm; font-size:7.5pt;"
          th:text="${(form['titulacion'] ?: 'Ingeniero Técnico Industrial') + ' / ' + (form['colegioOficial'] ?: 'COIIAOC')}"></span>

    <!-- S3 Emplazamiento Calle -->
    <span class="overlay-field" data-cal-id="m1_empl_calle" style="left:13mm; top:133.5mm; font-size:7.5pt;"
          th:text="${form['emplazamientoCompleto'] ?: form['direccionCompleta'] ?: form['emplazamientoCalle'] ?: ''}"></span>

    <!-- S3 Emplazamiento Localidad -->
    <span class="overlay-field" data-cal-id="m1_empl_loc" style="left:12.5mm; top:140.5mm; font-size:7.5pt;"
          th:text="${form['localidadEmplazamiento'] ?: form['localidad'] ?: ''}"></span>

    <!-- S3 Emplazamiento Provincia -->
    <span class="overlay-field" data-cal-id="m1_empl_prov" style="left:123mm; top:141.5mm; font-size:7.5pt;"
          th:text="${form['provinciaEmplazamiento'] ?: form['provincia'] ?: ''}"></span>

    <!-- S3 Emplazamiento CP -->
    <span class="overlay-field" data-cal-id="m1_empl_cp" style="left:161.5mm; top:141mm; font-size:7.5pt;"
          th:text="${form['codigoPostalEmplazamiento'] ?: form['codigoPostal'] ?: ''}"></span>

    <!-- S3 Emplazamiento Uso -->
    <span class="overlay-field" data-cal-id="m1_empl_uso" style="left:12.5mm; top:149mm; font-size:7.5pt;">Producción de energía eléctrica</span>

    <!-- S3 Emplazamiento Superficie -->
    <span class="overlay-field" data-cal-id="m1_empl_sup" style="left:82mm; top:149mm; font-size:7.5pt;"
          th:text="${form['superficie'] ?: '100'}"></span>

    <!-- S3 Emplazamiento Ocupantes -->
    <span class="overlay-field" data-cal-id="m1_empl_ocup" style="left:104.5mm; top:149mm; font-size:7.5pt;"
          th:text="${form['ocupacion'] ?: '1'}"></span>

    <!-- S3 Emplazamiento Tipo Inst. -->
    <span class="overlay-field" data-cal-id="m1_empl_tipo" style="left:121.5mm; top:148.5mm; font-size:7.5pt;"
          th:text="${form['tipoInstalacion'] ?: 'Instalación fotovoltaica interconectada'}"></span>

    <!-- S3 [X] Nueva Instalación -->
    <span class="overlay-marker" data-cal-id="m1_empl_nueva" th:if="${form['tipoActuacion'] == 'Nueva' or form['tipoActuacion'] == 'nueva' or form['tipoActuacion'] == null or form['tipoActuacion'] == ''}" style="left:26mm; top:159mm;">X</span>

    <!-- S3 [X] Ampliación -->
    <span class="overlay-marker" data-cal-id="m1_empl_ampliacion" th:if="${form['tipoActuacion'] == 'Ampliación' or form['tipoActuacion'] == 'ampliacion' or form['tipoActuacion'] == 'Ampliacion'}" style="left:62mm; top:159mm;">X</span>

    <!-- S3 [X] Modificación -->
    <span class="overlay-marker" data-cal-id="m1_empl_modificacion" th:if="${form['tipoActuacion'] == 'Modificación' or form['tipoActuacion'] == 'modificacion' or form['tipoActuacion'] == 'Modificacion'}" style="left:99mm; top:159mm;">X</span>

    <!-- Pág Número -->
    <span class="overlay-field" data-cal-id="m1_pag_num" style="left:125mm; top:284.5mm; font-size:7.5pt;">1</span>

    <!-- Pág Total -->
    <span class="overlay-field" data-cal-id="m1_pag_tot" style="left:137mm; top:284.5mm; font-size:7.5pt;">8</span>

</div>
