<div th:fragment="content" class="pagina-documento" th:style="${fondoStyle1}">

    <!-- S1 Nombre/Razón Social (Titular) -->
    <span class="overlay-field" data-cal-id="s1_nombre" style="left:37mm; top:19mm; font-size:7.5pt;"
          th:text="${form['apellidosNombre'] ?: ''}"></span>

    <!-- S1 NIF/NIE (Titular) -->
    <span class="overlay-field" data-cal-id="s1_nif" style="left:174mm; top:19mm; font-size:7.5pt;"
          th:text="${form['nifCif'] ?: ''}"></span>

    <!-- S1 Domicilio (Titular) -->
    <span class="overlay-field" data-cal-id="s1_dom" style="left:21mm; top:22.5mm; font-size:7.5pt;"
          th:text="${form['domicilio'] ?: ''}"></span>

    <!-- S1 Código Postal (Titular) -->
    <span class="overlay-field" data-cal-id="s1_cp" style="left:186.5mm; top:22.5mm; font-size:7.5pt;"
          th:text="${form['codigoPostal'] ?: ''}"></span>

    <!-- S1 Localidad (Titular) -->
    <span class="overlay-field" data-cal-id="s1_loc" style="left:21.5mm; top:25.5mm; font-size:7.5pt;"
          th:text="${form['localidad'] ?: ''}"></span>

    <!-- S1 Provincia (Titular) -->
    <span class="overlay-field" data-cal-id="s1_prov" style="left:78.5mm; top:25.5mm; font-size:7.5pt;"
          th:text="${form['provincia'] ?: ''}"></span>

    <!-- S1 Email (Titular) -->
    <span class="overlay-field" data-cal-id="s1_email" style="left:120mm; top:25.5mm; font-size:7.5pt;"
          th:text="${form['correoElectronico'] ?: ''}"></span>

    <!-- S1 Teléfono (Titular) -->
    <span class="overlay-field" data-cal-id="s1_tel" style="left:182.5mm; top:25.5mm; font-size:7.5pt;"
          th:text="${form['telefono'] ?: ''}"></span>

    <!-- S2 [X] Nueva Instalación -->
    <span class="overlay-marker" data-cal-id="s2_nueva" style="left:37mm; top:33.5mm;">X</span>

    <!-- S2 Nº Identificación -->
    <span class="overlay-field" data-cal-id="s2_id" style="left:173.5mm; top:32.5mm; font-size:7.5pt;"
          th:text="${form['numeroIdentificacion'] ?: ''}"></span>

    <!-- S2 Calle/Plaza Emplazamiento -->
    <span class="overlay-field" data-cal-id="s2_empl" style="left:27.5mm; top:35.5mm; font-size:7.5pt;"
          th:text="${form['emplazamientoCompleto'] ?: ''}"></span>

    <!-- S2 Localidad Emplazamiento -->
    <span class="overlay-field" data-cal-id="s2_loc" style="left:160mm; top:36mm; font-size:7.5pt;"
          th:text="${form['localidadEmplazamiento'] ?: ''}"></span>

    <!-- S2 [X] Provincia: Badajoz -->
    <span class="overlay-marker" data-cal-id="s2_badajoz" th:if="${form['esBadajoz'] == true or form['esBadajoz'] == 'true'}" style="left:28.5mm; top:40.5mm;">X</span>

    <!-- S2 [X] Provincia: Cáceres -->
    <span class="overlay-marker" data-cal-id="s2_caceres" th:if="${form['esCaceres'] == true or form['esCaceres'] == 'true'}" style="left:44.5mm; top:40.5mm;">X</span>

    <!-- S2 Uso destinado -->
    <span class="overlay-field" data-cal-id="s2_uso" style="left:84.5mm; top:39.5mm; font-size:7.5pt;"
          th:text="${form['usoDestino'] ?: ''}"></span>

    <!-- S2 Superficie (m²) -->
    <span class="overlay-field" data-cal-id="s2_sup" style="left:28mm; top:43mm; font-size:7.5pt;"
          th:text="${form['superficie'] ?: ''}"></span>

    <!-- S2 Ocupación (Personas) -->
    <span class="overlay-field" data-cal-id="s2_ocup" style="left:59mm; top:43.5mm; font-size:7.5pt;"
          th:text="${form['ocupacion'] ?: ''}"></span>

    <!-- S2 Tipo de Instalación -->
    <span class="overlay-field" data-cal-id="s2_tipo" style="left:96mm; top:43mm; font-size:7.5pt;"
          th:text="${form['tipoInstalacion'] ?: ''}"></span>

    <!-- S3 Tensión Un (V) -->
    <span class="overlay-field" data-cal-id="s3_un" style="left:22mm; top:67.5mm; font-size:7.5pt;"
          th:text="${form['tensionSuministro'] ?: ''}"></span>

    <!-- S3 Potencia instalada (kW) -->
    <span class="overlay-field" data-cal-id="s3_pot_inst" style="left:107mm; top:67.5mm; font-size:7.5pt;"
          th:text="${form['potenciaInstaladaPrevista'] ?: ''}"></span>

    <!-- S3 Potencia máx contratar (kW) -->
    <span class="overlay-field" data-cal-id="s3_pot_max" style="left:144.5mm; top:67.5mm; font-size:7.5pt;"
          th:text="${form['potenciaMaximaContratar'] ?: ''}"></span>

    <!-- S3 Potencia admisible (kW) -->
    <span class="overlay-field" data-cal-id="s3_pot_adm" style="left:180.5mm; top:67.5mm; font-size:7.5pt;"
          th:text="${form['potenciaMaximaAdmisible'] ?: form['e2_potenciaNominalInversores'] ?: form['potenciaACInversor'] ?: ''}"></span>

    <!-- S3 [X] Red Pública -->
    <span class="overlay-marker" data-cal-id="s3_red_pub" style="left:26.5mm; top:72mm;">X</span>

    <!-- S3 [X] Aislada -->
    <span class="overlay-marker" data-cal-id="s3_aislada" th:if="${form['esInstalacionAislada'] == true or form['esInstalacionAislada'] == 'true'}" style="left:136mm; top:75.5mm;">X</span>

    <!-- S3 [X] Interconectada -->
    <span class="overlay-marker" data-cal-id="s3_inter" th:if="${form['esInstalacionInterconectada'] == true or form['esInstalacionInterconectada'] == 'true' or (form['esInstalacionAislada'] != true and form['esInstalacionAislada'] != 'true')}" style="left:175.5mm; top:75.5mm;">X</span>

    <!-- S3 CGP -->
    <span class="overlay-field" data-cal-id="s3_cgp" style="left:42mm; top:81mm; font-size:7.5pt;"
          th:text="${form['cajasGeneralesProteccion'] ?: ''}"></span>

    <!-- S3 DI Sistema -->
    <span class="overlay-field" data-cal-id="s3_di_sist" style="left:114mm; top:84.5mm; font-size:7.5pt;"
          th:text="${form['sistemaInstalacionDI'] ?: ''}"></span>

    <!-- S3 DI Conductor -->
    <span class="overlay-field" data-cal-id="s3_di_cond" style="left:114.5mm; top:88.5mm; font-size:7.5pt;"
          th:text="${form['conductorDI'] ?: ''}"></span>

    <!-- S3 DI Sección (mm²) -->
    <span class="overlay-field" data-cal-id="s3_di_secc" style="left:114mm; top:91.5mm; font-size:7.5pt;"
          th:text="${form['seccionFase'] ?: ''}"></span>

    <!-- S3 DI Aislamiento -->
    <span class="overlay-field" data-cal-id="s3_di_aisl" style="left:114.5mm; top:95.5mm; font-size:7.5pt;"
          th:text="${form['aislamientoDI'] ?: 'XLPE'}"></span>

    <!-- S3 CGP Bases (A) -->
    <span class="overlay-field" data-cal-id="s3_cgp_bases" style="left:50.5mm; top:84.5mm; font-size:7.5pt;"
          th:text="${form['intensidadBasesCGP'] ?: ''}"></span>

    <!-- S3 CGP Fusibles (A) -->
    <span class="overlay-field" data-cal-id="s3_cgp_fus" style="left:50.5mm; top:88.5mm; font-size:7.5pt;"
          th:text="${form['intensidadFusiblesCGP'] ?: ''}"></span>

    <!-- S3 CGP Poder corte (kA) -->
    <span class="overlay-field" data-cal-id="s3_cgp_corte" style="left:50.5mm; top:91.5mm; font-size:7.5pt;"
          th:text="${form['poderCorteFusibles'] ?: ''}"></span>

    <!-- S3 IG Corte IN (A) -->
    <span class="overlay-field" data-cal-id="s3_ig_in" style="left:115mm; top:112.5mm; font-size:7.5pt;"
          th:text="${form['intensidadNominal'] ?: ''}"></span>

    <!-- S3 IG Poder corte (kA) -->
    <span class="overlay-field" data-cal-id="s3_ig_corte" style="left:114.5mm; top:116mm; font-size:7.5pt;"
          th:text="${form['poderCorteIG'] ?: ''}"></span>

    <!-- S3 Tipo de Protección (Sobretensiones) -->
    <span class="overlay-field" data-cal-id="s3_prot_tipo" style="left:174.5mm; top:84.5mm; font-size:7.5pt;"
          th:text="${form['tipoProteccionSobretensiones'] ?: 'I.A.'}"></span>

    <!-- S3 Categorías de Sobretensiones -->
    <span class="overlay-field" data-cal-id="s3_prot_cat" style="left:174.5mm; top:88.5mm; font-size:7.5pt;"
          th:text="${form['categoriaSobretensiones'] ?: 'I.V.'}"></span>

    <!-- S3 [X] Dif 30mA -->
    <span class="overlay-marker" data-cal-id="s3_dif_30" th:if="${form['sensibilidadDiferencial'] == '30' or form['sensibilidadDiferencial'] == null}" style="left:159.5mm; top:99.5mm;">X</span>

    <!-- S3 [X] Dif 300mA -->
    <span class="overlay-marker" data-cal-id="s3_dif_300" th:if="${form['sensibilidadDiferencial'] == '300'}" style="left:181mm; top:100mm;">X</span>

    <!-- S3 Prot contactos -->
    <span class="overlay-field" data-cal-id="s3_cont_ind" style="left:9mm; top:123.5mm; font-size:7.5pt;">Diferencial</span>

    <!-- S3 Conductores Tierra -->
    <span class="overlay-field" data-cal-id="s3_tierra" style="left:69.5mm; top:123.5mm; font-size:7.5pt;"
          th:text="${form['conductoresTierra'] ?: ''}"></span>

    <!-- S3 Resistencia Tierra -->
    <span class="overlay-field" data-cal-id="s3_res_tierra" style="left:126mm; top:123.5mm; font-size:7.5pt;">20</span>

    <!-- S3 Resistencia Aislamiento -->
    <span class="overlay-field" data-cal-id="s3_res_aisl" style="left:163.5mm; top:123.5mm; font-size:7.5pt;">3000</span>

    <!-- S4 Empresa -->
    <span class="overlay-field" data-cal-id="s4_emp" style="left:46.5mm; top:227mm; font-size:7.5pt;">SOLAY INGENIEROS, S.L.</span>

    <!-- S4 Empresa CIF -->
    <span class="overlay-field" data-cal-id="s4_cif" style="left:94.5mm; top:244.5mm; font-size:7.5pt;">B09848912</span>

    <!-- S4 Empresa Nº ID -->
    <span class="overlay-field" data-cal-id="s4_id_emp" style="left:77mm; top:245mm; font-size:7.5pt;">41045500</span>

    <!-- S4 Instalador Autorizado -->
    <span class="overlay-field" data-cal-id="s4_inst" style="left:61mm; top:162mm; font-size:7.5pt;"
          th:text="${form['instaladorNombre'] ?: ''}"></span>

    <!-- S4 Habilitación Profesional -->
    <span class="overlay-field" data-cal-id="s4_hab" style="left:38.5mm; top:245.5mm; font-size:7.5pt;">INGENIERO INDUSTRIAL</span>

    <!-- S4 NIF Instalador -->
    <span class="overlay-field" data-cal-id="s4_nif_inst" style="left:101.5mm; top:228.5mm; font-size:7.5pt;"
          th:text="${form['nifInstalador'] ?: ''}"></span>

    <!-- S4 Organismo Control -->
    <span class="overlay-field" data-cal-id="s4_org" style="left:109mm; top:168.5mm; font-size:7.5pt;"
          th:text="${form['organismoControl'] ?: ''}"></span>

    <!-- S4 Nº Certificado -->
    <span class="overlay-field" data-cal-id="s4_ref" style="left:39.5mm; top:172mm; font-size:7.5pt;"
          th:text="${form['referenciaCertificado'] ?: ''}"></span>

    <!-- S4 Fecha de Certificado -->
    <span class="overlay-field" data-cal-id="s4_fecha" style="left:125mm; top:205mm; font-size:7.5pt;"
          th:text="${form['fechaCertificado'] ?: ''}"></span>

    <!-- S4 Director de Obra (Condicionado a llevaProyecto) -->
    <th:block th:if="${form['llevaProyecto'] == true or form['llevaProyecto'] == 'true'}">
        <span class="overlay-field" style="left:20mm; top:186.5mm; font-size:7.5pt;"
              th:text="${form['directorDeObra'] ?: ''}"></span>
        <span class="overlay-field" style="left:100mm; top:186.5mm; font-size:7.5pt;"
              th:text="${form['titulacion'] ?: ''}"></span>
        <span class="overlay-field" style="left:140mm; top:186.5mm; font-size:7.5pt;"
              th:text="${form['colegioOficial'] ?: ''}"></span>
        <span class="overlay-field" style="left:175mm; top:186.5mm; font-size:7.5pt;"
              th:text="${form['numeroColegiado'] ?: ''}"></span>
    </th:block>

    <!-- Firma del Instalador (Puesta más arriba) -->
    <img th:if="${firmaBase64 != null and !firmaBase64.isEmpty()}" th:src="${firmaBase64}"
         style="position: absolute; left: 145mm; top: 180mm; width: 40mm; height: auto; mix-blend-mode: multiply;" />

    <!-- Firma Lugar -->
    <span class="overlay-field" data-cal-id="s4_lugar" style="left:39mm; top:209mm; font-size:7.5pt;"
          th:text="${form['localidad'] ?: ''}"></span>

    <!-- Firma Día -->
    <span class="overlay-field" data-cal-id="s4_dia" style="left:101mm; top:209.5mm; font-size:7.5pt;"
          th:text="${form['dia'] ?: ''}"></span>

    <!-- Firma Mes -->
    <span class="overlay-field" data-cal-id="s4_mes" style="left:118.5mm; top:209.5mm; font-size:7.5pt;"
          th:text="${form['mes'] ?: ''}"></span>

    <!-- Firma Año -->
    <span class="overlay-field" data-cal-id="s4_anio" style="left:160.5mm; top:209.5mm; font-size:7.5pt;"
          th:text="${form['anio'] ?: ''}"></span>

</div>
