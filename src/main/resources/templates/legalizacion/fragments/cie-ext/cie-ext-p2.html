<div th:fragment="content" class="pagina-documento" th:style="${fondoStyle2}">

    <!-- 1.1 [X] Actuación: Nueva instalación -->
    <span class="overlay-marker" data-cal-id="p2_act_nueva" th:if="${form['instalacion'] == 'nueva' or form['tipoInstalacion'] == 'nueva' or (form['instalacion'] == null and form['tipoInstalacion'] == null)}" style="left:28mm; top:32.5mm;">X</span>

    <!-- 1.1 [X] Actuación: Ampliación -->
    <span class="overlay-marker" data-cal-id="p2_act_amp" th:if="${form['instalacion'] == 'ampliacion' or form['tipoInstalacion'] == 'ampliacion'}" style="left:57mm; top:32.5mm;">X</span>

    <!-- 1.1 [X] Actuación: Modificación -->
    <span class="overlay-marker" data-cal-id="p2_act_mod" th:if="${form['instalacion'] == 'modificacion' or form['tipoInstalacion'] == 'modificacion'}" style="left:80mm; top:32.5mm;">X</span>

    <!-- 1.1 Nº identificación instalación -->
    <span class="overlay-field" data-cal-id="p2_n_id" style="left:173.5mm; top:32mm; font-size:7.5pt;"
          th:text="${form['numeroIdentificacion'] ?: ''}"></span>

    <!-- 1.1 Coordenada UTM X (ETRS 89) -->
    <span class="overlay-field" data-cal-id="p2_utm_x" style="left:101mm; top:36mm; font-size:7.5pt;"
          th:text="${form['coordenadaX'] ?: ''}"></span>

    <!-- 1.1 Coordenada UTM Y (ETRS 89) -->
    <span class="overlay-field" data-cal-id="p2_utm_y" style="left:161.5mm; top:36mm; font-size:7.5pt;"
          th:text="${form['coordenadaY'] ?: ''}"></span>

    <!-- 1.1 [X] Huso UTM: 29 -->
    <span class="overlay-marker" data-cal-id="p2_huso_29" th:if="${form['coordenadaHuso'] == '29' or form['coordenadaHuso'] == 29}" style="left:54.5mm; top:37.5mm;">X</span>

    <!-- 1.1 [X] Huso UTM: 30 -->
    <span class="overlay-marker" data-cal-id="p2_huso_30" th:if="${form['coordenadaHuso'] == '30' or form['coordenadaHuso'] == 30 or form['coordenadaHuso'] == null}" style="left:63.5mm; top:37.5mm;">X</span>

    <!-- 2.1 [X] Clasif: Aislada -->
    <span class="overlay-marker" data-cal-id="p2_gen_aislada" th:if="${form['esInstalacionAislada'] == true or form['esInstalacionAislada'] == 'true'}" style="left:41mm; top:46mm;">X</span>

    <!-- 2.1 [X] Clasif: Interconectada red int. -->
    <span class="overlay-marker" data-cal-id="p2_gen_int" th:if="${form['esInstalacionAislada'] != true and form['esInstalacionAislada'] != 'true'}" style="left:156.5mm; top:46mm;">X</span>

    <!-- 2.1 [X] Modalidad: Autoconsumo Tipo 1 -->
    <span class="overlay-marker" data-cal-id="p2_gen_aut1" th:if="${form['modalidadAutoconsumo'] == 'Tipo 1' or form['modalidadAutoconsumo'] == 'sin-excedentes' or form['modalidadAutoconsumo'] == 'sin_excedentes'}" style="left:35.5mm; top:51mm;">X</span>

    <!-- 2.1 [X] Modalidad: Autoconsumo Tipo 2 -->
    <span class="overlay-marker" data-cal-id="p2_gen_aut2" th:if="${form['modalidadAutoconsumo'] == 'Tipo 2' or form['modalidadAutoconsumo'] == 'con-excedentes' or form['modalidadAutoconsumo'] == 'con_excedentes' or form['modalidadAutoconsumo'] == null}" style="left:77mm; top:51mm;">X</span>

    <!-- 2.1 Potencia instalada (kW) -->
    <span class="overlay-field" data-cal-id="p2_gen_pot" style="left:33.5mm; top:55mm; font-size:7.5pt;"
          th:text="${form['potenciaInstaladaPrevista'] ?: ''}"></span>

    <!-- 2.1 [X] Tec. Gen: Fotovoltaica -->
    <span class="overlay-marker" data-cal-id="p2_gen_fv" style="left:51mm; top:61mm;">X</span>

    <!-- 3.1 Nº paneles fotovoltaicos -->
    <span class="overlay-field" data-cal-id="p2_pan_num" style="left:39mm; top:73.5mm; font-size:7.5pt;"
          th:text="${form['totalModulos'] ?: ''}"></span>

    <!-- 3.1 Potencia pico total (kWp) -->
    <span class="overlay-field" data-cal-id="p2_pan_pot_pico" style="left:87.5mm; top:73.5mm; font-size:7.5pt;"
          th:text="${form['potenciaPicoGenerador'] ?: ''}"></span>

    <!-- 3.1 [X] Tipo Panel: Monocristalino -->
    <span class="overlay-marker" data-cal-id="p2_pan_mono" th:if="${form['tecnologiaCelulaModulo'] == 'Monocristalino' or form['tecnologiaCelulaModulo'] == null}" style="left:125mm; top:74mm;">X</span>

    <!-- 3.1 [X] Tipo Panel: Policristalino -->
    <span class="overlay-marker" data-cal-id="p2_pan_poly" th:if="${form['tecnologiaCelulaModulo'] == 'Policristalino'}" style="left:155.5mm; top:74mm;">X</span>

    <!-- 3.1 [X] Implantación: Cubierta -->
    <span class="overlay-marker" data-cal-id="p2_pan_cubierta" style="left:46mm; top:79mm;">X</span>

    <!-- 3.1 [X] Seguimiento: Fija -->
    <span class="overlay-marker" data-cal-id="p2_pan_fija" style="left:153mm; top:79.5mm;">X</span>

    <!-- 3.1 Panel Fabricante y Modelo -->
    <span class="overlay-field" data-cal-id="p2_pan_fab" style="left:29.5mm; top:82.5mm; font-size:7.5pt;"
          th:text="${form['marcaModulo'] ?: ''}"></span>
    <span class="overlay-field" data-cal-id="p2_pan_mod" style="left:96mm; top:82.5mm; font-size:7.5pt;"
          th:text="${form['modeloModulo'] ?: ''}"></span>

    <!-- 3.1 Panel Potencia unitaria (Wp) -->
    <span class="overlay-field" data-cal-id="p2_pan_pot_unit" style="left:181.5mm; top:83.5mm; font-size:7.5pt;"
          th:text="${form['potenciaPicoModulo'] ?: ''}"></span>

    <!-- 3.1 Inversores - Número total -->
    <span class="overlay-field" data-cal-id="p2_inv_num" style="left:38mm; top:91.5mm; font-size:7.5pt;"
          th:text="${form['totalInversores'] ?: ''}"></span>

    <!-- 3.1 Inversores - Pot. nominal total (kW) -->
    <span class="overlay-field" data-cal-id="p2_inv_pot_total" style="left:87mm; top:91.5mm; font-size:7.5pt;"
          th:text="${form['potenciaACInversor'] ?: ''}"></span>

    <!-- 3.1 Inversores - Tension salida total Un(V) -->
    <span class="overlay-field" data-cal-id="p2_inv_un_total" style="left:140mm; top:91mm; font-size:7.5pt;"
          th:text="${form['tensionNominalInversor'] ?: '230'}"></span>

    <!-- 3.1 [X] Inversor Total: Monofásico -->
    <span class="overlay-marker" data-cal-id="p2_inv_mono_total" th:if="${form['tipoConexionInversor'] == 'Monofasico' or form['tipoConexionInversor'] == null}" style="left:163mm; top:92.5mm;">X</span>

    <!-- 3.1 [X] Inversor Total: Trifásico -->
    <span class="overlay-marker" data-cal-id="p2_inv_tri_total" th:if="${form['tipoConexionInversor'] == 'Trifasico'}" style="left:184.5mm; top:92.5mm;">X</span>

    <!-- 3.1 Inversor Fabricante y Modelo -->
    <span class="overlay-field" data-cal-id="p2_inv_fab" style="left:26.5mm; top:97mm; font-size:7.5pt;"
          th:text="${form['marcaInversor'] ?: ''}"></span>
    <span class="overlay-field" data-cal-id="p2_inv_mod" style="left:90mm; top:97mm; font-size:7.5pt;"
          th:text="${form['modeloInversor'] ?: ''}"></span>

    <!-- 3.1 Inversor Potencia unitaria (kW) -->
    <span class="overlay-field" data-cal-id="p2_inv_pot_unit" style="left:184.5mm; top:96.5mm; font-size:7.5pt;"
          th:text="${form['potenciaACInversor'] ?: ''}"></span>

    <!-- 3.1 Inversor Corriente salida In(A) -->
    <span class="overlay-field" data-cal-id="p2_inv_in" style="left:45.5mm; top:101.5mm; font-size:7.5pt;"
          th:text="${form['corrienteSalidaInversor'] ?: ''}"></span>

    <!-- 3.1 Inversor Tension salida unitaria Un(V) -->
    <span class="overlay-field" data-cal-id="p2_inv_un_unit" style="left:140mm; top:101.5mm; font-size:7.5pt;"
          th:text="${form['tensionNominalInversor'] ?: '230'}"></span>

    <!-- 3.1 [X] Inversor Unitario: Monofásico -->
    <span class="overlay-marker" data-cal-id="p2_inv_mono_unit" th:if="${form['tipoConexionInversor'] == 'Monofasico' or form['tipoConexionInversor'] == null}" style="left:162.5mm; top:103mm;">X</span>

    <!-- 3.1 [X] Inversor Unitario: Trifásico -->
    <span class="overlay-marker" data-cal-id="p2_inv_tri_unit" th:if="${form['tipoConexionInversor'] == 'Trifasico'}" style="left:184mm; top:103mm;">X</span>

    <!-- 4.1 Baterías - Número de elementos -->
    <span class="overlay-field" data-cal-id="p2_bat_num" style="left:48mm; top:181.5mm; font-size:7.5pt;"
          th:text="${form['numeroBaterias'] ?: ''}"></span>

    <!-- 4.1 Baterías - Capacidad total (Ah) -->
    <span class="overlay-field" data-cal-id="p2_bat_cap_total" style="left:96mm; top:181mm; font-size:7.5pt;"
          th:text="${form['capacidadNominalBateria'] ?: ''}"></span>

    <!-- 4.1 Baterías - Tipo (química) -->
    <span class="overlay-field" data-cal-id="p2_bat_tipo" style="left:124.5mm; top:181.5mm; font-size:7.5pt;"
          th:text="${form['tipoBateria'] ?: ''}"></span>

    <!-- 4.1 Baterías Fabricante y Modelo -->
    <span class="overlay-field" data-cal-id="p2_bat_fab" style="left:35.5mm; top:186mm; font-size:7.5pt;"
          th:text="${form['marcaBateria'] ?: ''}"></span>
    <span class="overlay-field" data-cal-id="p2_bat_mod" style="left:130mm; top:186mm; font-size:7.5pt;"
          th:text="${form['modeloBateria'] ?: ''}"></span>

    <!-- 4.1 Batería Capacidad unitaria (Ah) -->
    <span class="overlay-field" data-cal-id="p2_bat_cap_unit" style="left:58mm; top:190mm; font-size:7.5pt;"
          th:text="${form['capacidadNominalBateria'] ?: ''}"></span>

    <!-- 4.1 Batería Tensión unitaria (V) -->
    <span class="overlay-field" data-cal-id="p2_bat_tension_unit" style="left:109.5mm; top:190mm; font-size:7.5pt;"
          th:text="${form['tensionNominalBateria'] ?: ''}"></span>

    <!-- 4.1 Batería Tensión salida total (V) -->
    <span class="overlay-field" data-cal-id="p2_bat_tension_total" style="left:175mm; top:190.5mm; font-size:7.5pt;"
          th:text="${form['tensionSalidaTotalBateria'] ?: ''}"></span>

</div>
