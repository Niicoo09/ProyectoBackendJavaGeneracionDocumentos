<div th:fragment="content(fondoStyle)" class="pagina-documento" th:style="${fondoStyle}">

    <!-- 1.1 [X] Actuación: Nueva instalación -->
    <span class="overlay-marker" style="left:28mm; top:32.5mm;">X</span>

    <!-- 1.1 [X] Actuación: Ampliación -->
    <span class="overlay-marker" style="left:56.5mm; top:33mm;">X</span>

    <!-- 1.1 [X] Actuación: Modificación -->
    <span class="overlay-marker" style="left:80.5mm; top:33mm;">X</span>

    <!-- 1.1 Nº identificación instalación -->
    <span class="overlay-field" style="left:173.5mm; top:31.5mm; font-size:7.5pt;"
          th:text="${form['numeroIdentificacion'] ?: ''}"></span>

    <!-- 1.1 Coordenada UTM X (ETRS 89) -->
    <span class="overlay-field" style="left:101mm; top:36.5mm; font-size:7.5pt;"
          th:text="${form['coordenadaX'] ?: ''}"></span>

    <!-- 1.1 Coordenada UTM Y (ETRS 89) -->
    <span class="overlay-field" style="left:161.5mm; top:36mm; font-size:7.5pt;"
          th:text="${form['coordenadaY'] ?: ''}"></span>

    <!-- 1.1 [X] Huso UTM: 29 -->
    <span class="overlay-marker" th:if="${form['coordenadaHuso'] == '29' or form['coordenadaHuso'] == 29}" style="left:54mm; top:37mm;">X</span>

    <!-- 1.1 [X] Huso UTM: 30 -->
    <span class="overlay-marker" th:if="${form['coordenadaHuso'] == '30' or form['coordenadaHuso'] == 30 or form['coordenadaHuso'] == null}" style="left:63.5mm; top:37mm;">X</span>

    <!-- 2.1 [X] Clasif: Aislada -->
    <span class="overlay-marker" th:if="${form['esInstalacionAislada'] == true or form['esInstalacionAislada'] == 'true'}" style="left:41mm; top:46.5mm;">X</span>

    <!-- 2.1 [X] Clasif: Interconectada red int. -->
    <span class="overlay-marker" th:if="${form['esInstalacionAislada'] != true and form['esInstalacionAislada'] != 'true'}" style="left:156.5mm; top:46mm;">X</span>

    <!-- 2.1 [X] Modalidad: Autoconsumo Tipo 1 -->
    <span class="overlay-marker" th:if="${form['modalidadAutoconsumo'] == 'Tipo 1' or form['modalidadAutoconsumo'] == 'sin-excedentes' or form['modalidadAutoconsumo'] == 'sin_excedentes'}" style="left:35.5mm; top:51.5mm;">X</span>

    <!-- 2.1 [X] Modalidad: Autoconsumo Tipo 2 -->
    <span class="overlay-marker" th:if="${form['modalidadAutoconsumo'] == 'Tipo 2' or form['modalidadAutoconsumo'] == 'con-excedentes' or form['modalidadAutoconsumo'] == 'con_excedentes' or form['modalidadAutoconsumo'] == null}" style="left:77mm; top:51mm;">X</span>

    <!-- 2.1 Potencia instalada (kW) -->
    <span class="overlay-field" style="left:34.5mm; top:54.5mm; font-size:7.5pt;"
          th:text="${form['potenciaInstaladaPrevista'] ?: ''}"></span>

    <!-- 2.1 [X] Tec. Gen: Fotovoltaica -->
    <span class="overlay-marker" style="left:51mm; top:62mm;">X</span>

    <!-- 3.1 Nº paneles fotovoltaicos -->
    <span class="overlay-field" style="left:38.5mm; top:73mm; font-size:7.5pt;"
          th:text="${form['totalModulos'] ?: ''}"></span>

    <!-- 3.1 Potencia pico total (kWp) -->
    <span class="overlay-field" style="left:87.5mm; top:73.5mm; font-size:7.5pt;"
          th:text="${form['potenciaPicoGenerador'] ?: ''}"></span>

    <!-- 3.1 [X] Tipo Panel: Monocristalino -->
    <span class="overlay-marker" th:if="${form['tecnologiaCelulaModulo'] == 'Monocristalino' or form['tecnologiaCelulaModulo'] == null}" style="left:125mm; top:75mm;">X</span>

    <!-- 3.1 [X] Tipo Panel: Policristalino -->
    <span class="overlay-marker" th:if="${form['tecnologiaCelulaModulo'] == 'Policristalino'}" style="left:155.5mm; top:75mm;">X</span>

    <!-- 3.1 [X] Implantación: Cubierta -->
    <span class="overlay-marker" style="left:46mm; top:79mm;">X</span>

    <!-- 3.1 [X] Seguimiento: Fija -->
    <span class="overlay-marker" style="left:152.5mm; top:79mm;">X</span>

    <!-- 3.1 Panel Fabricante y Modelo -->
    <span class="overlay-field" style="left:25.5mm; top:83mm; font-size:7.5pt;"
          th:text="${form['marcaModeloModulo'] ?: ''}"></span>

    <!-- 3.1 Panel Potencia unitaria (Wp) -->
    <span class="overlay-field" style="left:181.5mm; top:83mm; font-size:7.5pt;"
          th:text="${form['potenciaPicoModulo'] ?: ''}"></span>

    <!-- 3.1 Inversores - Número total -->
    <span class="overlay-field" style="left:38.5mm; top:91mm; font-size:7.5pt;"
          th:text="${form['totalInversores'] ?: ''}"></span>

    <!-- 3.1 Inversores - Pot. nominal total (kW) -->
    <span class="overlay-field" style="left:86.5mm; top:91.5mm; font-size:7.5pt;"
          th:text="${form['potenciaACInversor'] ?: ''}"></span>

    <!-- 3.1 Inversores - Tension salida total Un(V) -->
    <span class="overlay-field" style="left:140mm; top:91mm; font-size:7.5pt;"
          th:text="${form['tensionNominalInversor'] ?: '230'}"></span>

    <!-- 3.1 [X] Inversor Total: Monofásico -->
    <span class="overlay-marker" th:if="${form['tipoConexionInversor'] == 'Monofasico' or form['tipoConexionInversor'] == null}" style="left:162.5mm; top:92.5mm;">X</span>

    <!-- 3.1 [X] Inversor Total: Trifásico -->
    <span class="overlay-marker" th:if="${form['tipoConexionInversor'] == 'Trifasico'}" style="left:184mm; top:93mm;">X</span>

    <!-- 3.1 Inversor Fabricante y Modelo -->
    <span class="overlay-field" style="left:25.5mm; top:96.5mm; font-size:7.5pt;"
          th:text="${form['marcaModeloInversor'] ?: ''}"></span>

    <!-- 3.1 Inversor Potencia unitaria (kW) -->
    <span class="overlay-field" style="left:183.5mm; top:96mm; font-size:7.5pt;"
          th:text="${form['potenciaACInversor'] ?: ''}"></span>

    <!-- 3.1 Inversor Corriente salida In(A) -->
    <span class="overlay-field" style="left:45.5mm; top:101.5mm; font-size:7.5pt;"
          th:text="${form['corrienteSalidaInversor'] ?: ''}"></span>

    <!-- 3.1 Inversor Tension salida unitaria Un(V) -->
    <span class="overlay-field" style="left:140mm; top:101.5mm; font-size:7.5pt;"
          th:text="${form['tensionNominalInversor'] ?: '230'}"></span>

    <!-- 3.1 [X] Inversor Unitario: Monofásico -->
    <span class="overlay-marker" th:if="${form['tipoConexionInversor'] == 'Monofasico' or form['tipoConexionInversor'] == null}" style="left:162.5mm; top:103mm;">X</span>

    <!-- 3.1 [X] Inversor Unitario: Trifásico -->
    <span class="overlay-marker" th:if="${form['tipoConexionInversor'] == 'Trifasico'}" style="left:184mm; top:103mm;">X</span>

    <!-- 4.1 Baterías - Número de elementos -->
    <span class="overlay-field" style="left:47.5mm; top:180.5mm; font-size:7.5pt;"
          th:text="${form['numeroBaterias'] ?: ''}"></span>

    <!-- 4.1 Baterías - Capacidad total (Ah) -->
    <span class="overlay-field" style="left:95mm; top:180.5mm; font-size:7.5pt;"
          th:text="${form['capacidadNominalBateria'] ?: ''}"></span>

    <!-- 4.1 Baterías - Tipo (química) -->
    <span class="overlay-field" style="left:124.5mm; top:181mm; font-size:7.5pt;"
          th:text="${form['tipoBateria'] ?: ''}"></span>

    <!-- 4.1 Baterías Fabricante y Modelo -->
    <span class="overlay-field" style="left:35.5mm; top:186mm; font-size:7.5pt;"
          th:text="${form['marcaModeloBateria'] ?: ''}"></span>

    <!-- 4.1 Batería Capacidad unitaria (Ah) -->
    <span class="overlay-field" style="left:59mm; top:190.5mm; font-size:7.5pt;"
          th:text="${form['capacidadNominalBateria'] ?: ''}"></span>

    <!-- 4.1 Batería Tensión unitaria (V) -->
    <span class="overlay-field" style="left:110mm; top:190.5mm; font-size:7.5pt;"
          th:text="${form['tensionNominalBateria'] ?: ''}"></span>

    <!-- 4.1 Batería Tensión salida total (V) -->
    <span class="overlay-field" style="left:175mm; top:190mm; font-size:7.5pt;"
          th:text="${form['tensionSalidaTotalBateria'] ?: ''}"></span>

</div>
