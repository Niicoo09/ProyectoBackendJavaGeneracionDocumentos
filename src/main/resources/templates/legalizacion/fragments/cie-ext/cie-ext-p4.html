<div th:fragment="content" class="pagina-documento" th:style="${fondoStyle4}">

    <!-- P4 Firma Lugar -->
    <span class="overlay-field" data-cal-id="p4_lugar" style="left:41mm; top:199mm; font-size:7.5pt;"
          th:text="${form['localidad'] ?: form['lugar'] ?: ''}"></span>

    <!-- P4 Firma Día -->
    <span class="overlay-field" data-cal-id="p4_dia" style="left:89.5mm; top:199mm; font-size:7.5pt;"
          th:text="${form['dia'] ?: ''}"></span>

    <!-- P4 Firma Mes -->
    <span class="overlay-field" data-cal-id="p4_mes" style="left:103.5mm; top:199mm; font-size:7.5pt;"
          th:text="${form['mes'] ?: ''}"></span>

    <!-- P4 Firma Año -->
    <span class="overlay-field" data-cal-id="p4_anio" style="left:138.5mm; top:199.5mm; font-size:7.5pt;"
          th:text="${form['anio'] ?: ''}"></span>

    <!-- Firma del Instalador con sello en la página 4 -->
    <img th:if="${firmaBase64 != null and !firmaBase64.isEmpty()}" th:src="${firmaBase64}"
         style="position: absolute; left: 118mm; top: 210mm; width: 35mm; height: auto; mix-blend-mode: multiply;" />

</div>
