<div th:fragment="content" class="pagina-documento" th:style="${fondoStyle3}">

    <!-- 5.1.1 Empresa distribuidora -->
    <span class="overlay-field" data-cal-id="p3_dist" style="left:38mm; top:41.5mm; font-size:7.5pt;"
          th:text="${form['empresaDistribuidora'] ?: ''}"></span>

    <!-- 5.1.1 Código unificado punto suministro (CUPS) -->
    <span class="overlay-field" data-cal-id="p3_cups" style="left:156mm; top:42mm; font-size:7.5pt;"
          th:text="${form['cups'] ?: ''}"></span>

    <!-- 5.1.1 Titular del punto de suministro -->
    <span class="overlay-field" data-cal-id="p3_tit_sum" style="left:49mm; top:46.5mm; font-size:7.5pt;"
          th:text="${form['apellidosNombre'] ?: ''}"></span>

    <!-- 5.1.1 Potencia contratada (kW) -->
    <span class="overlay-field" data-cal-id="p3_pot_sum" style="left:178.5mm; top:46.5mm; font-size:7.5pt;"
          th:text="${form['potenciaContratada'] ?: ''}"></span>

    <!-- 5.1.1 Titular de la instalación de generation -->
    <span class="overlay-field" data-cal-id="p3_tit_gen" style="left:93.5mm; top:51.5mm; font-size:7.5pt;"
          th:text="${form['apellidosNombre'] ?: ''}"></span>

    <!-- 5.1.1 [X] Tensión nominal: 230 -->
    <span class="overlay-marker" data-cal-id="p3_un_230" th:if="${form['fase'] == 'Monofásica' or form['fase'] == 'Monofasica' or form['tensionNominalInversor'] == '230' or form['tensionSuministro'] == '230'}" style="left:39.5mm; top:57.5mm;">X</span>

    <!-- 5.1.1 [X] Tensión nominal: 3x230/400 -->
    <span class="overlay-marker" data-cal-id="p3_un_400" th:if="${form['fase'] == 'Trifásica' or form['fase'] == 'Trifasica' or form['tensionNominalInversor'] == '400' or form['tensionSuministro'] == '400'}" style="left:55mm; top:58mm;">X</span>

    <!-- 5.1.1 Intensidad de cortocircuito (kA) -->
    <span class="overlay-field" data-cal-id="p3_ika" style="left:136mm; top:57mm; font-size:7.5pt;"
          th:text="${form['1'] ?: ''}"></span>

</div>
