<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Declaración de Cesión y Tratamiento de Datos (Anexo A)</title>
    <style>
        @page {
            size: A4;
            margin: 0;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
        }
        .pagina-documento {
            width: 210mm;
            height: 296mm;
            position: relative;
            margin: 0 auto;
            background-size: 100% 100%;
            background-repeat: no-repeat;
            page-break-after: always;
            overflow: hidden;
        }
        .overlay-field {
            position: absolute;
            display: inline-block;
            box-sizing: border-box;
            overflow: hidden;
            white-space: nowrap;
            color: #000;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <!-- PÁGINA 1 -->
    <div class="pagina-documento" th:style="${fondoStyle1}">
        <!-- nombreApellidos -->
        <span class="overlay-field" 
              th:text="${form['apellidosNombre'] ?: ''}"
              style="left: 36mm; top: 80.5mm; width: 60mm; height: 8mm; font-size: 10px; text-align: left;">
        </span>
        <!-- nif -->
        <span class="overlay-field" 
              th:text="${form['nifCif'] ?: ''}"
              style="left: 163mm; top: 80.5mm; width: 30mm; height: 8mm; font-size: 10px; text-align: left;">
        </span>
        <!-- domicilio completo -->
        <span class="overlay-field" 
              th:text="${(form['direccionCompleta'] ?: '') + ' - ' + (form['codigoPostalEmplazamiento'] ?: '') + ' - ' + (form['localidadEmplazamiento'] ?: '') + ' - ' + (form['provinciaEmplazamiento'] ?: '')}"
              style="left: 36mm; top: 85.5mm; width: 160mm; height: 8mm; font-size: 9px; text-align: left;">
        </span>
        <!-- nombreRepresentante -->
        <span class="overlay-field" 
              th:text="${form['nombreRepresentanteEntidad'] ?: ''}"
              style="left: 36mm; top: 95.5mm; width: 160mm; height: 8mm; font-size: 10px; text-align: left;">
        </span>
        <!-- dniRepresentante -->
        <span class="overlay-field" 
              th:text="${form['dniRepresentanteEntidad'] ?: ''}"
              style="left: 163mm; top: 95.5mm; width: 30mm; height: 8mm; font-size: 10px; text-align: left;">
        </span>
        <!-- nombreEntidadRepresentada -->
        <span class="overlay-field" 
              th:text="${form['denominacionEstablecimiento'] ?: ''}"
              style="left: 91mm; top: 100.5mm; width: 160mm; height: 8mm; font-size: 10px; text-align: left;">
        </span>
        <!-- nifEntidadRepresentada -->
        <span class="overlay-field" 
              th:text="${form['nifEstablecimiento'] ?: ''}"
              style="left: 36mm; top: 105.5mm; width: 160mm; height: 8mm; font-size: 10px; text-align: left;">
        </span>
    </div>

    <!-- PÁGINA 2 -->
    <div class="pagina-documento" th:style="${fondoStyle2}">
        <!-- Ciudad -->
        <span class="overlay-field" 
              th:text="${form['localidadEmplazamiento'] ?: ''}"
              style="left: 45mm; top: 100.5mm; width: 60mm; height: 8mm; font-size: 10px; text-align: left;">
        </span>
        <!-- Día -->
        <span class="overlay-field" 
              th:text="${form['diaAceptacion'] ?: ''}"
              style="left: 107mm; top: 100.5mm; width: 20mm; height: 8mm; font-size: 10px; text-align: center;">
        </span>
        <!-- Mes -->
        <span class="overlay-field" 
              th:text="${form['mesAceptacion'] ?: ''}"
              style="left: 125mm; top: 100.5mm; width: 20mm; height: 8mm; font-size: 10px; text-align: center;">
        </span>
        <!-- Año -->
        <span class="overlay-field" 
              th:text="${form['anioAceptacion'] ?: ''}"
              style="left: 148mm; top: 100.5mm; width: 30mm; height: 8mm; font-size: 10px; text-align: center;">
        </span>
        <!-- Firma -->
        <div class="overlay-field" style="left: 75mm; top: 113mm; width: 80mm; height: 22mm; text-align: center;">
            <img th:src="${firmaBase64}" style="max-width: 100%; max-height: 100%; object-fit: contain;" />
        </div>
        <!-- Nombre Firma -->
        <span class="overlay-field" 
              th:text="${form['apellidosNombre'] ?: ''}"
              style="left: 75mm; top: 131.5mm; width: 80mm; height: 8mm; font-size: 10px; text-align: center;">
        </span>
    </div>
</body>
</html>
