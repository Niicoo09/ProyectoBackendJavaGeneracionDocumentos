<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Cartel Publicitario L4</title>
    <style>
        @page {
            size: A4 landscape;
            margin: 0;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background-color: white;
            width: 297mm;
            height: 210mm;
            overflow: hidden;
        }

        .pagina-documento {
            width: 297mm;
            height: 210mm;
            position: relative;
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center;
        }

        .overlay-field {
            position: absolute;
            display: inline-block;
            box-sizing: border-box;
            line-height: 1.2;
            padding: 3mm 13mm 3mm 2mm;
            background-color: white;
            color: #000;
        }
    </style>
</head>

<body>
    <div class="pagina-documento" th:style="${fondoStyle}">
        <!-- costeActuacion -->
        <div class="overlay-field" th:text="${form['presupuestoInicial'] ?: '0,00'}"
            style="left: 97mm; top: 116mm; font-size: 19pt; font-weight: bold; text-align: left; white-space: nowrap;">
        </div>

        <!-- cuantiaSubvencion -->
        <div class="overlay-field" th:text="${form['importeSubvencionResultante'] ?: '0,00'}"
            style="left: 113mm; top: 128.5mm; font-size: 19pt; font-weight: bold; text-align: left; white-space: nowrap;">
        </div>

        <!-- entidadUbicacion -->
        <div class="overlay-field"
            th:text="${(form['direccionCompleta'] ?: '') + ' - ' + (form['codigoPostalEmplazamiento'] ?: '') + ' - ' + (form['localidadEmplazamiento'] ?: '') + ' - ' + (form['provinciaEmplazamiento'] ?: '')}"
            style="left: 143mm; top: 142.5mm; width: 130mm; font-size: 15pt; font-weight: normal; text-align: left; white-space: normal;">
        </div>
    </div>
</body>

</html>
