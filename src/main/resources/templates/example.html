<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Documento de Generación</title>
    <style>
        body {
            font-family: 'Helvetica', 'Arial', sans-serif;
            color: #333;
            line-height: 1.6;
            margin: 40px;
            background-color: #fff;
        }
        .container {
            max-width: 800px;
            margin: auto;
            border: 1px solid #eee;
            padding: 30px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .header {
            text-align: center;
            border-bottom: 3px solid #0056b3;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        .header h1 {
            margin: 0;
            color: #0056b3;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .info-section {
            margin-bottom: 20px;
        }
        .info-label {
            font-weight: bold;
            color: #555;
            display: block;
            margin-bottom: 5px;
        }
        .info-value {
            font-size: 1.1em;
            color: #000;
        }
        .content-box {
            background-color: #f8f9fa;
            border-left: 5px solid #0056b3;
            padding: 20px;
            margin-top: 30px;
            word-wrap: break-word;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9em;
        }
        .footer {
            margin-top: 50px;
            padding-top: 10px;
            border-top: 1px solid #ddd;
            font-size: 0.85em;
            color: #777;
            text-align: center;
        }
        .timestamp {
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 th:text="${title}">Documento Oficial de Generación</h1>
        </div>

        <div class="info-section">
            <span class="info-label">Cliente:</span>
            <span class="info-value" th:text="${name}">Nombre del Cliente</span>
        </div>

        <div class="info-section">
            <span class="info-label">Estado de la prueba:</span>
            <span class="info-value">Exitosa - Conexión con base de datos activa</span>
        </div>

        <div class="content-box">
            <span class="info-label">Datos del Formulario (Raw JSON):</span>
            <p th:text="${description}">Aquí aparecerán los datos del JSON...</p>
        </div>

        <div class="footer">
            <p>Este documento es una prueba técnica generada automáticamente.</p>
            <p class="timestamp">Generado el: <span th:text="${#calendars.format(#calendars.createNow(), 'dd/MM/yyyy HH:mm')}"></span></p>
        </div>
    </div>
</body>
</html>
